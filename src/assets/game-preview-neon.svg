<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="220" viewBox="0 0 1400 220" role="img" aria-labelledby="title desc">
  <title id="title">Ivano's Tetris Neon Banner</title>
  <desc id="desc">Dark neon banner image for Ivano's Tetris repository.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#02132a"/>
      <stop offset="100%" stop-color="#0b0f20"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1400" height="220" fill="url(#bg)"/>

  <text
    x="700"
    y="92"
    text-anchor="middle"
    fill="#c4ff2b"
    font-family="Courier New, monospace"
    font-size="82"
    font-weight="700"
    letter-spacing="2"
    filter="url(#glow)">
    Ivano's Tetris
  </text>

  <text
    x="700"
    y="158"
    text-anchor="middle"
    fill="#87d9ff"
    font-family="Courier New, monospace"
    font-size="33">
    Classic Tetris in neon mode: stack smart, clear lines, level up.
  </text>
</svg>
