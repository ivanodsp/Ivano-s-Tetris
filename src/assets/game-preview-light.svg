<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="220" viewBox="0 0 1400 220" role="img" aria-labelledby="title desc">
  <title id="title">Ivano's Tetris Light Banner</title>
  <desc id="desc">Light banner image for Ivano's Tetris repository.</desc>
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1400" height="220" fill="#f7fbff"/>
  <rect x="1" y="1" width="1398" height="218" fill="none" stroke="#d8e7f6" stroke-width="2"/>

  <text
    x="700"
    y="92"
    text-anchor="middle"
    fill="#67b95b"
    font-family="Courier New, monospace"
    font-size="82"
    font-weight="700"
    letter-spacing="2"
    filter="url(#glow)">
    Ivano's Tetris
  </text>

  <text
    x="700"
    y="158"
    text-anchor="middle"
    fill="#395a88"
    font-family="Courier New, monospace"
    font-size="33">
    Classic Tetris in light mode: stack smart, clear lines, level up.
  </text>
</svg>
