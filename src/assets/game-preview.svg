<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="310" viewBox="0 0 1200 310" role="img" aria-labelledby="title desc">
  <title id="title">Ivano's Tetris Banner</title>
  <desc id="desc">Neon banner image for Ivano's Tetris README.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#02132a"/>
      <stop offset="100%" stop-color="#0b0f20"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="310" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="310" fill="#000" opacity="0.12"/>

  <text
    x="600"
    y="125"
    text-anchor="middle"
    fill="#b7ff00"
    font-family="Courier New, monospace"
    font-size="96"
    font-weight="700"
    letter-spacing="2"
    filter="url(#glow)">
    Ivano's Tetris
  </text>

  <text
    x="600"
    y="205"
    text-anchor="middle"
    fill="#8fc2de"
    font-family="Courier New, monospace"
    font-size="39">
    Classic Tetris in neon mode: stack smart, clear lines, level up.
  </text>
</svg>
