<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Ivano's Tetris Preview</title>
  <desc id="desc">Neon styled preview art for Ivano's Tetris.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1a"/>
      <stop offset="100%" stop-color="#090412"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="190" cy="120" r="170" fill="#17f2ff" opacity="0.12"/>
  <circle cx="1060" cy="520" r="190" fill="#ff2fd8" opacity="0.12"/>

  <text x="80" y="130" fill="#b7ff00" font-family="Courier New, monospace" font-size="64" font-weight="700" filter="url(#glow)">
    Ivano's Tetris
  </text>
  <text x="80" y="185" fill="#87a8be" font-family="Courier New, monospace" font-size="28">
    Classic neon blocks. Responsive controls. Mobile touch support.
  </text>

  <g transform="translate(760,110)">
    <rect x="0" y="0" width="300" height="420" rx="14" fill="#040b14" stroke="#17f2ff" stroke-width="4"/>
    <g transform="translate(30,30)">
      <rect x="0" y="0" width="48" height="48" fill="#17f2ff"/>
      <rect x="48" y="0" width="48" height="48" fill="#17f2ff"/>
      <rect x="96" y="0" width="48" height="48" fill="#17f2ff"/>
      <rect x="144" y="0" width="48" height="48" fill="#17f2ff"/>

      <rect x="0" y="96" width="48" height="48" fill="#ff2fd8"/>
      <rect x="48" y="96" width="48" height="48" fill="#ff2fd8"/>
      <rect x="96" y="96" width="48" height="48" fill="#ff2fd8"/>
      <rect x="96" y="144" width="48" height="48" fill="#ff2fd8"/>

      <rect x="192" y="192" width="48" height="48" fill="#ff8b2b"/>
      <rect x="192" y="240" width="48" height="48" fill="#ff8b2b"/>
      <rect x="192" y="288" width="48" height="48" fill="#ff8b2b"/>
      <rect x="144" y="288" width="48" height="48" fill="#ff8b2b"/>

      <rect x="0" y="336" width="48" height="48" fill="#b7ff00"/>
      <rect x="48" y="336" width="48" height="48" fill="#b7ff00"/>
      <rect x="48" y="288" width="48" height="48" fill="#b7ff00"/>
      <rect x="96" y="288" width="48" height="48" fill="#b7ff00"/>
    </g>
  </g>

  <text x="80" y="285" fill="#17f2ff" font-family="Courier New, monospace" font-size="30">How to play</text>
  <text x="80" y="330" fill="#e9f5ff" font-family="Courier New, monospace" font-size="24">- Arrow keys to move and rotate</text>
  <text x="80" y="365" fill="#e9f5ff" font-family="Courier New, monospace" font-size="24">- Hold keys for continuous movement</text>
  <text x="80" y="400" fill="#e9f5ff" font-family="Courier New, monospace" font-size="24">- Touch arrows appear on mobile devices</text>
</svg>
