<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ivano's Tetris</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="game-timer" aria-live="polite">Time: <span id="timer">00:00</span></div>

    <div class="game-container">
      <div class="main-panel">
        <div>
          <h1>Ivano's Tetris</h1>
          <div class="subtitle">Classic Tetris in neon mode: stack smart, clear lines, level up.</div>
        </div>
        <canvas id="gameCanvas" width="300" height="600"></canvas>
      </div>

      <div class="side-panel">
        <div class="info-section">
          <h3>Level</h3>
          <div class="score" id="level">1</div>
          <h3>Lines</h3>
          <div class="score" id="lines">0</div>
          <h3>Current Score</h3>
          <div class="score" id="score">0</div>
          <h3>High Score</h3>
          <div class="high-score" id="high-score">0</div>
          <div class="status" id="status">Playing...</div>
        </div>

        <div class="info-section">
          <h3>Controls</h3>
          <div class="controls">
            <strong>←/→</strong> Move<br />
            <strong>↑</strong> Rotate<br />
            <strong>↓</strong> Soft Drop<br />
            <strong>Space</strong> Hard Drop<br />
            <strong>P</strong> Pause
          </div>
        </div>
      </div>
    </div>

    <div class="mobile-controls" id="mobileControls" aria-label="Mobile game controls">
      <button class="mobile-btn up" data-action="rotate" aria-label="Rotate">↑</button>
      <button class="mobile-btn left" data-action="left" aria-label="Move left">←</button>
      <button class="mobile-btn down" data-action="down" aria-label="Soft drop">↓</button>
      <button class="mobile-btn right" data-action="right" aria-label="Move right">→</button>
    </div>

    <div class="game-over" id="gameOver">
      <h2>GAME OVER</h2>
      <p>The stack hit the top.</p>
      <p>Final Score: <span id="finalScore">0</span></p>
      <button onclick="location.reload()">Restart</button>
    </div>

    <script src="index.js"></script>
  </body>
</html>
